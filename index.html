<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Matchday Lineup</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#002059">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KPFC Lineup">
<style>
  :root{
    --ground:#F4F5FA;
    --card:#FFFFFF;
    --ink:#12213F;
    --ink-dim:#5B6B8C;
    --navy:#002059;
    --navy-tint:#E7EAF5;
    --royal:#163683;
    --on:#1E8E4F;
    --on-tint:#E1F3E7;
    --off:#ED1B30;
    --off-tint:#FCE3E6;
    --bench:#5B6B8C;
    --bench-tint:#EDEFF6;
    --line:#DCE0EC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ground);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  .brand{
    display:flex;align-items:center;gap:10px;padding:14px 14px 6px;background:var(--ground);
  }
  .brand-logo{width:40px;height:40px;border-radius:50%;flex:0 0 auto;display:block;}
  .brand-name{font:800 15px/1.2 -apple-system,sans-serif;color:var(--navy);letter-spacing:.01em;}
  .brand-sub{font:700 10px/1.2 -apple-system,sans-serif;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}

  /* Segmented tab switch */
  .tabs{
    display:flex;gap:6px;padding:10px 14px 0;background:var(--ground);
    position:sticky;top:0;z-index:20;
  }
  .tab-btn{
    flex:1;padding:9px 0;border:none;border-radius:10px;
    background:transparent;color:var(--ink-dim);
    font:700 12px/1 -apple-system,sans-serif;letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;
  }
  .tab-btn.active{background:var(--navy);color:#fff;}

  .timerbar{
    position:sticky;top:40px;z-index:19;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 14px;background:var(--card);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .timer-info{display:flex;flex-direction:column;}
  .timer-clock{font:800 26px/1.1 -apple-system,sans-serif;font-variant-numeric:tabular-nums;color:var(--navy);}
  .timer-clock.over{color:var(--off);}
  .half-toggle{display:flex;gap:4px;margin-top:5px;}
  .half-btn{
    padding:4px 8px;border-radius:6px;border:none;cursor:pointer;
    font:700 10px/1 -apple-system,sans-serif;letter-spacing:.03em;text-transform:uppercase;
    background:var(--navy-tint);color:var(--navy);
  }
  .half-btn.active{background:var(--navy);color:#fff;}
  .timer-controls{display:flex;gap:8px;flex:0 0 auto;}
  .timer-btn{
    padding:9px 14px;border-radius:8px;border:none;cursor:pointer;
    font:700 13px -apple-system,sans-serif;background:var(--navy);color:#fff;
  }
  .timer-btn.running{background:var(--off);}
  .timer-btn.ghost{background:var(--navy-tint);color:var(--navy);}

  .scorepanel{background:var(--card);border-bottom:1px solid var(--line);}
  .scorebar{display:flex;align-items:flex-start;justify-content:center;gap:18px;padding:10px 14px;}
  .score-side{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:74px;}
  .score-label{
    font:800 10px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
  }
  .score-num{font:800 30px/1 -apple-system,sans-serif;font-variant-numeric:tabular-nums;color:var(--navy);}
  .score-sep{font:800 20px/1 -apple-system,sans-serif;color:var(--ink-dim);padding-top:20px;}
  .score-btnrow{display:flex;gap:6px;}
  .score-btn{
    padding:6px 10px;border-radius:6px;border:none;cursor:pointer;
    font:700 11px -apple-system,sans-serif;background:var(--navy);color:#fff;white-space:nowrap;
  }
  .score-btn.ghost{background:var(--navy-tint);color:var(--navy);}
  .scorer-picker{
    display:flex;align-items:center;gap:8px;padding:0 14px 12px;
  }
  .scorer-picker select{
    flex:1;padding:9px 8px;border-radius:8px;border:1px solid var(--line);
    font:600 13px -apple-system,sans-serif;background:#fff;color:var(--ink);
  }

  .slot-picker-sheet{
    position:fixed;left:50%;bottom:0;transform:translateX(-50%);
    width:100%;max-width:480px;
    display:flex;align-items:center;gap:8px;
    background:var(--card);border-radius:16px 16px 0 0;
    padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 16px rgba(0,0,0,.18);z-index:25;
  }
  .slot-picker-sheet select{
    flex:1;padding:9px 8px;border-radius:8px;border:1px solid var(--line);
    font:600 13px -apple-system,sans-serif;background:#fff;color:var(--ink);
  }

  .goal-log-card{margin-left:14px;margin-right:14px;}
  .goal-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);}
  .goal-row:first-of-type{border-top:none;}
  .goal-time{
    flex:0 0 auto;font:800 11px/1 -apple-system,sans-serif;font-variant-numeric:tabular-nums;
    color:var(--navy);background:var(--navy-tint);padding:5px 8px;border-radius:6px;white-space:nowrap;
  }
  .goal-scorer{flex:1;font:600 15px/1.2 -apple-system,sans-serif;}
  .goal-remove{background:none;border:none;color:var(--off);font-size:16px;line-height:1;cursor:pointer;padding:2px 6px;}

  /* Match day header / stepper */
  .stepper{
    position:sticky;top:104px;z-index:18;
    background:var(--navy);color:#fff;
    padding:14px 14px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
  }
  .step-btn{
    width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);
    background:rgba(255,255,255,.08);color:#fff;font-size:20px;line-height:1;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .step-btn:disabled{opacity:.3;cursor:default;}
  .step-mid{text-align:center;flex:1;}
  .step-period{
    font:800 13px/1 -apple-system,sans-serif;letter-spacing:.12em;text-transform:uppercase;
    opacity:.85;margin-bottom:3px;
  }
  .step-clock{
    font:800 22px/1 -apple-system,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.01em;
  }

  .content{padding:16px 14px 90px;flex:1;}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:14px;
  }
  .card h2{
    margin:0 0 10px;font:800 12px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
  }
  .pitch-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .pitch-card-header h2{margin:0;}
  .formation-badge{
    font:800 11px -apple-system,sans-serif;letter-spacing:.03em;color:var(--royal);
    background:var(--navy-tint);padding:3px 8px;border-radius:6px;
  }

  .pitch{
    position:relative;overflow:hidden;border-radius:12px;
    background:linear-gradient(180deg,#2F7D4F,#215F40);
    padding:18px 6px 14px;
  }
  .pitch-halfway{position:absolute;left:6%;right:6%;top:52%;border-top:2px solid rgba(255,255,255,.32);}
  .pitch-circle{
    position:absolute;left:50%;top:52%;width:74px;height:74px;margin:-37px 0 0 -37px;
    border:2px solid rgba(255,255,255,.32);border-radius:50%;
  }
  .pitch-box{
    position:absolute;left:50%;bottom:6px;width:124px;height:32px;margin-left:-62px;
    border:2px solid rgba(255,255,255,.32);border-bottom:none;border-radius:4px 4px 0 0;
  }
  .pitch-rows{position:relative;z-index:1;display:flex;flex-direction:column;gap:12px;}
  .pitch-row{display:flex;justify-content:space-evenly;}
  .p-slot{
    display:flex;flex-direction:column;align-items:center;gap:4px;max-width:80px;
    cursor:pointer;padding:4px;border-radius:10px;transition:background .12s;
  }
  .p-slot:active{background:rgba(255,255,255,.14);}
  .p-slot.active .p-mark{box-shadow:0 0 0 3px #FFD400,0 2px 5px rgba(0,0,0,.28);}
  .p-mark{
    flex:0 0 auto;width:40px;height:40px;
    clip-path:polygon(30% 0%, 50% 14%, 70% 0%, 100% 20%, 80% 34%, 80% 100%, 20% 100%, 20% 34%, 0% 20%);
    background:var(--navy);color:#fff;border:1.5px solid rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;padding-top:9px;
    font:800 11px/1 -apple-system,sans-serif;letter-spacing:.02em;
    box-shadow:0 2px 5px rgba(0,0,0,.28);
  }
  .p-mark-gk{background:#E85D9C;}
  .p-mark-empty{background:var(--off);}
  .p-name-pill{
    background:rgba(255,255,255,.95);color:var(--ink);
    font:700 11px/1.2 -apple-system,sans-serif;padding:3px 7px;border-radius:8px;
    white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;
  }
  .p-name-pill-empty{background:var(--off-tint);color:#8C1220;}

  .bench-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);}
  .bench-row:first-of-type{border-top:none;}
  .bench-chip{
    flex:0 0 46px;text-align:center;background:var(--bench-tint);color:var(--bench);
    font:800 11px/1 -apple-system,sans-serif;letter-spacing:.04em;border-radius:7px;padding:6px 0;
  }
  .p-name{font:600 16px/1.2 -apple-system,sans-serif;}

  .bench-next-grid{display:flex;gap:14px;align-items:flex-start;}
  .bench-col{flex:0 0 108px;min-width:0;}
  .bench-col .bench-row{gap:8px;}
  .bench-col .bench-chip{flex-basis:34px;padding:5px 0;font-size:10px;}
  .bench-col .p-name{font-size:14px;}
  .next-col{flex:1;min-width:0;}
  .next-title{font:800 12px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:2px;}
  .next-range{font:600 13px/1 -apple-system,sans-serif;color:var(--ink-dim);margin-bottom:12px;}
  .chip-group{margin-bottom:10px;}
  .chip-group:last-child{margin-bottom:0;}
  .chip-label{
    display:flex;align-items:center;gap:6px;
    font:800 11px/1 -apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;
  }
  .chip-label.on{color:var(--on);}
  .chip-label.off{color:var(--off);}
  .chip-list{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{
    display:flex;align-items:center;gap:6px;
    border-radius:20px;padding:7px 12px;font:600 14px/1 -apple-system,sans-serif;
  }
  .pill.on{background:var(--on-tint);color:#145C34;}
  .pill.off{background:var(--off-tint);color:#8C1220;}
  .pill .pos{
    font-weight:800;font-size:11px;letter-spacing:.02em;
    background:rgba(0,0,0,.1);padding:2px 6px;border-radius:6px;
  }
  .empty-note{font:500 14px/1.4 -apple-system,sans-serif;color:var(--ink-dim);}
  .swap-note{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    font:500 13px/1.5 -apple-system,sans-serif;color:var(--ink-dim);
  }
  .swap-note b{color:var(--ink);}

  .fulltime{
    text-align:center;padding:10px 0 2px;
    font:700 15px/1.4 -apple-system,sans-serif;color:var(--navy);
  }

  /* Edit view */
  .edit-section{margin-bottom:18px;}
  .edit-section h2{
    margin:0 0 10px;font:800 12px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
  }
  .edit-section summary{
    margin:0;padding:2px 0;
    font:800 12px/1 -apple-system,sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
    cursor:pointer;list-style:none;
    display:flex;align-items:center;gap:8px;
  }
  .edit-section summary .summary-label{flex:1;}
  .edit-section summary .summary-badge{
    font:800 11px -apple-system,sans-serif;letter-spacing:.03em;text-transform:none;color:var(--royal);
    background:var(--navy-tint);padding:3px 8px;border-radius:6px;
  }
  .edit-section summary::-webkit-details-marker{display:none;}
  .edit-section summary::after{
    content:'▸';font-size:11px;color:var(--ink-dim);transition:transform .15s;
  }
  .edit-section details[open] summary{margin-bottom:10px;}
  .edit-section details[open] summary::after{transform:rotate(90deg);}
  .field-label{
    font:700 10px/1 -apple-system,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;
  }
  .roster-item{margin-bottom:12px;}
  .roster-row{display:flex;gap:8px;align-items:center;}
  .roster-row input[type=text]{
    flex:1 1 0;min-width:0;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font:600 14px/1 -apple-system,sans-serif;background:#fff;color:var(--ink);
  }
  .category-toggle{display:flex;gap:6px;margin-top:6px;}
  .category-btn{
    flex:1;padding:5px 0;border-radius:6px;border:none;cursor:pointer;
    font:700 10px/1 -apple-system,sans-serif;letter-spacing:.04em;
    background:var(--navy-tint);color:var(--navy);
  }
  .category-btn.active{background:var(--navy);color:#fff;}
  .icon-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--off);
    font-size:16px;cursor:pointer;flex:0 0 auto;
  }
  .add-btn{
    width:100%;padding:10px;border-radius:8px;border:1.5px dashed var(--line);background:transparent;
    color:var(--navy);font:700 13px -apple-system,sans-serif;cursor:pointer;margin-top:2px;
  }
  .period-edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .period-edit-idx{flex:0 0 26px;font:800 11px -apple-system,sans-serif;color:var(--ink-dim);text-align:center;}
  .period-label-input{
    flex:1;min-width:0;padding:7px 6px;border:1px solid var(--line);border-radius:6px;font:600 12px -apple-system,sans-serif;text-align:center;
  }
  #formationSelect{
    width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);
    font:600 14px -apple-system,sans-serif;background:#fff;color:var(--ink);
  }
  .lineup-status{
    font:700 12px -apple-system,sans-serif;color:var(--ink-dim);margin-bottom:10px;
  }
  .lineup-status.warn{color:var(--off);}
  .lineup-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:4px;border-radius:8px;}
  .lineup-row.empty{background:var(--off-tint);}
  .lineup-pos{
    flex:0 0 44px;text-align:center;font:800 11px -apple-system,sans-serif;letter-spacing:.02em;
    color:var(--royal);background:var(--navy-tint);padding:7px 0;border-radius:6px;
  }
  .lineup-row select{
    flex:1;min-width:0;padding:8px;border-radius:8px;border:1px solid var(--line);
    font:600 13px -apple-system,sans-serif;background:#fff;color:var(--ink);
  }
  .reserve-row{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--ground);
  }
  .reserve-row.unavailable{background:var(--off-tint);}
  .reserve-name{flex:1;font:600 14px -apple-system,sans-serif;color:var(--ink);}
  .reserve-toggle{display:flex;gap:6px;flex:0 0 auto;}
  .reserve-btn{
    padding:5px 10px;border-radius:6px;border:none;cursor:pointer;
    font:700 10px/1 -apple-system,sans-serif;letter-spacing:.03em;text-transform:uppercase;
    background:var(--navy-tint);color:var(--navy);
  }
  .reserve-btn.active{background:var(--navy);color:#fff;}
  .reserve-btn.unavailable-btn.active{background:var(--off);}
  .periods-slider-row{margin-bottom:14px;}
  .periods-slider-row input[type=range]{width:100%;accent-color:var(--navy);}
  .periods-slider-readout{
    font:700 12px -apple-system,sans-serif;color:var(--ink-dim);margin-top:4px;text-align:center;
  }
  .backup-box textarea{
    width:100%;min-height:90px;padding:8px;border:1px solid var(--line);border-radius:8px;
    font:500 11px/1.4 ui-monospace,monospace;color:var(--ink-dim);background:var(--ground);resize:vertical;
  }
  .backup-actions{display:flex;gap:8px;margin-top:8px;}
  .btn{
    flex:1;padding:9px 0;border-radius:8px;border:none;cursor:pointer;
    font:700 13px -apple-system,sans-serif;
  }
  .btn.primary{background:var(--navy);color:#fff;}
  .btn.ghost{background:var(--navy-tint);color:var(--navy);}
  .save-toast{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:8px 16px;border-radius:20px;font:600 13px -apple-system,sans-serif;
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .save-toast.show{opacity:1;}
</style>
</head>
<body>

<script>
(function(){
  var STORAGE_KEY = 'matchdayLineupData_v1';

  // Each formation's rows are drawn top (attack) to bottom (goalkeeper) on
  // the pitch graphic. Every formation totals 11 codes (10 outfield + GK).
  var DEFAULT_FORMATION = '4-5-1';
  var FORMATIONS = {
    '4-5-1': {
      rows: [
        ['ST1'],
        ['CAM'],
        ['LM','CM1','CM2','RM'],
        ['LB','CB1','CB2','RB'],
        ['GK']
      ]
    },
    '4-2-3-1': {
      rows: [
        ['ST1'],
        ['LW','CAM','RW'],
        ['CM1','CM2'],
        ['LB','CB1','CB2','RB'],
        ['GK']
      ]
    },
    '4-3-3': {
      rows: [
        ['LW','ST1','RW'],
        ['CM1','CM2','CM3'],
        ['LB','CB1','CB2','RB'],
        ['GK']
      ]
    },
    '3-5-2': {
      rows: [
        ['ST1','ST2'],
        ['LM','CM1','CM2','CM3','RM'],
        ['CB1','CB2','CB3'],
        ['GK']
      ]
    },
    '4-4-2': {
      rows: [
        ['ST1','ST2'],
        ['LM','CM1','CM2','RM'],
        ['LB','CB1','CB2','RB'],
        ['GK']
      ]
    },
    '3-4-2-1': {
      rows: [
        ['ST1'],
        ['CAM1','CAM2'],
        ['LM','CM1','CM2','RM'],
        ['CB1','CB2','CB3'],
        ['GK']
      ]
    }
  };
  var FORMATION_KEYS = ['4-5-1','4-2-3-1','4-3-3','3-5-2','4-4-2','3-4-2-1'];

  function getFormationRows(){
    var f = FORMATIONS[data.formation];
    return f ? f.rows : FORMATIONS[DEFAULT_FORMATION].rows;
  }

  // Flatten the formation into a GK-first list, for the Starting Lineup table.
  function getStartingLineupPositions(){
    var codes = [];
    getFormationRows().slice().reverse().forEach(function(row){
      row.forEach(function(code){ codes.push(code); });
    });
    return codes;
  }

  function formationCodeSet(key){
    var set = {};
    (FORMATIONS[key] ? FORMATIONS[key].rows : []).forEach(function(row){
      row.forEach(function(code){ set[code] = true; });
    });
    return set;
  }

  function formationChangeWouldBenchSomeone(newKey){
    var valid = formationCodeSet(newKey);
    return data.players.some(function(pl){
      ensureAssignRow(pl.id);
      return data.assignments[pl.id].some(function(code){
        return code !== 'SUB' && !valid[code];
      });
    });
  }

  function switchFormation(newKey){
    if(newKey === data.formation) return;
    var valid = formationCodeSet(newKey);
    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      var arr = data.assignments[pl.id];
      for(var i=0;i<arr.length;i++){
        if(arr[i] !== 'SUB' && !valid[arr[i]]) arr[i] = 'SUB';
      }
    });
    data.formation = newKey;
    saveData();
  }

  var DEFAULT_PLAYERS = [
    {id:'p1', name:'Emiline'}, {id:'p2', name:'Georgia'}, {id:'p3', name:'Saffron'},
    {id:'p4', name:'Madison A'}, {id:'p5', name:'Bec'}, {id:'p6', name:'Maddie X'},
    {id:'p7', name:'Jacinta'}, {id:'p8', name:'Lexi'}, {id:'p9', name:'Mollie'},
    {id:'p10', name:'Alida'}, {id:'p11', name:'Annabelle'}, {id:'p12', name:'Amy'},
    {id:'p13', name:'Emily'}
  ];

  var DEFAULT_ASSIGN = {
    p1:  ['GK','GK','GK','GK','GK','GK'],
    p2:  ['CB1','CB1','CB1','CB1','CB1','CB1'],
    p3:  ['CB2','CB2','CB2','CB2','CB2','CB2'],
    p4:  ['LB','LB','SUB','LB','LB','LB'],
    p5:  ['RB','RM','RM','RB','RM','SUB'],
    p6:  ['LM','RB','LB','LM','RB','SUB'],
    p7:  ['RM','SUB','RB','RM','SUB','RB'],
    p8:  ['CM1','CM1','CM1','CM1','CM1','CM1'],
    p9:  ['SUB','LM','LM','SUB','LM','LM'],
    p10: ['SUB','SUB','SUB','CAM','CM2','RM'],
    p11: ['CAM','CAM','CAM','SUB','CAM','CAM'],
    p12: ['CM2','CM2','CM2','CM2','SUB','CM2'],
    p13: ['ST1','ST1','ST1','ST1','ST1','ST1']
  };

  var DEFAULT_PERIOD_LABELS = ['0-15 min','15-30 min','30-45 min','45-60 min','60-75 min','75-90 min'];
  var DEFAULT_PERIOD_HALF = ['1st Half','1st Half','1st Half','2nd Half','2nd Half','2nd Half'];

  function firstNameOnly(s){
    return (s||'').trim().split(/\s+/)[0] || '';
  }

  function makeId(){
    return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  function ensurePlayerFields(players){
    players.forEach(function(pl){
      if(!pl.categories) pl.categories = [];
      if(typeof pl.unavailable !== 'boolean') pl.unavailable = false;
    });
  }

  function defaultData(){
    var players = JSON.parse(JSON.stringify(DEFAULT_PLAYERS));
    ensurePlayerFields(players);
    return {
      players: players,
      assignments: JSON.parse(JSON.stringify(DEFAULT_ASSIGN)),
      periodLabels: DEFAULT_PERIOD_LABELS.slice(),
      periodHalves: DEFAULT_PERIOD_HALF.slice(),
      periodsPerHalf: 3,
      formation: DEFAULT_FORMATION
    };
  }

  // Older saved data stored players as plain full-name strings keyed by name.
  // Convert to {id,name} records (first name only) keyed by stable id.
  function migrateLegacyFormat(d){
    if(!d.players.length || typeof d.players[0] !== 'string') return d;
    var newPlayers = [];
    var newAssignments = {};
    d.players.forEach(function(fullName){
      var id = makeId();
      newPlayers.push({id:id, name: firstNameOnly(fullName)});
      newAssignments[id] = d.assignments[fullName] || ['SUB','SUB','SUB','SUB','SUB','SUB'];
    });
    return {
      players: newPlayers,
      assignments: newAssignments,
      periodLabels: d.periodLabels,
      periodHalves: d.periodHalves
    };
  }

  // One-time rename applied to whatever's already saved on a device, so the
  // 2026-07 request to rename Maddie/Madison takes effect without re-typing.
  // Persisted immediately below so this block can be deleted later without
  // the names reverting.
  var ONE_OFF_RENAMES = {
    'Madison':'Madison A', 'Maddie':'Maddie X',
    'Madison X':'Madison A', 'Maddie A':'Maddie X'
  };
  function applyOneOffRenames(d){
    var changed = false;
    d.players.forEach(function(pl){
      if(ONE_OFF_RENAMES[pl.name]){ pl.name = ONE_OFF_RENAMES[pl.name]; changed = true; }
    });
    return changed;
  }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var d = migrateLegacyFormat(JSON.parse(raw));
        if(!d.periodsPerHalf){
          d.periodsPerHalf = Math.round((d.periodLabels||[]).length / 2) || 3;
        }
        if(!d.formation || !FORMATIONS[d.formation]) d.formation = DEFAULT_FORMATION;
        ensurePlayerFields(d.players);
        if(applyOneOffRenames(d)) localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        return d;
      }
    }catch(e){}
    return defaultData();
  }

  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    var t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(saveData._h);
    saveData._h = setTimeout(function(){t.classList.remove('show');},1100);
  }

  var data = loadData();
  var currentPeriod = 0; // 0-indexed, 0..5
  var squadExpanded = false; // Squad section starts collapsed on Edit Team
  var backupExpanded = false; // Backup/restore section starts collapsed on Edit Team
  var periodsExpanded = false; // Periods section starts collapsed on Edit Team
  var startingLineupExpanded = false; // Starting Lineup section starts collapsed on Edit Team

  /* ---------- Match clock (45 min per half stopwatch) ---------- */

  var HALF_LENGTH_SECONDS = 45 * 60;
  var clockSeconds = 0;
  var clockRunning = false;
  var clockInterval = null;

  function formatClock(totalSeconds){
    var m = Math.floor(totalSeconds / 60);
    var s = totalSeconds % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function renderClock(){
    var el = document.getElementById('timerClock');
    if(!el) return;
    if(clockSeconds >= HALF_LENGTH_SECONDS){
      el.textContent = '45:00 +' + formatClock(clockSeconds - HALF_LENGTH_SECONDS);
      el.classList.add('over');
    } else {
      el.textContent = formatClock(clockSeconds);
      el.classList.remove('over');
    }
  }

  function toggleClock(){
    clockRunning = !clockRunning;
    if(clockRunning){
      clockInterval = setInterval(function(){
        clockSeconds++;
        renderClock();
      }, 1000);
    } else {
      clearInterval(clockInterval);
    }
    var btn = document.getElementById('timerToggleBtn');
    if(btn){
      btn.textContent = clockRunning ? 'Pause' : 'Start';
      btn.classList.toggle('running', clockRunning);
    }
  }

  function resetClock(){
    clockSeconds = 0;
    renderClock();
  }

  var currentHalf = '1st Half';

  function setHalf(half){
    if(currentHalf === half) return;
    currentHalf = half;
    resetClock(); // a new half starts its own 45-minute count
    updateHalfButtons();
  }

  function updateHalfButtons(){
    var b1 = document.getElementById('half1Btn');
    var b2 = document.getElementById('half2Btn');
    if(b1) b1.classList.toggle('active', currentHalf === '1st Half');
    if(b2) b2.classList.toggle('active', currentHalf === '2nd Half');
  }

  /* ---------- Score & goal log ---------- */

  var oppScore = 0;
  var goalLog = []; // {id, playerId (null = unknown), half, clockLabel}

  function renderScoreboard(){
    var kEl = document.getElementById('kissoScoreNum');
    var oEl = document.getElementById('oppScoreNum');
    if(kEl) kEl.textContent = String(goalLog.length);
    if(oEl) oEl.textContent = String(oppScore);
  }

  function showScorerPicker(){
    var picker = document.getElementById('scorerPicker');
    if(!picker) return;
    var options = sortedPlayers().filter(function(pl){ return !pl.unavailable; }).map(function(pl){
      return '<option value="'+pl.id+'">'+escapeHtml(pl.name)+'</option>';
    }).join('');
    picker.innerHTML =
      '<select id="scorerSelect"><option value="">Who scored?</option>'+options+'<option value="__unknown">Unknown</option></select>'+
      '<button class="score-btn ghost" id="scorerCancelBtn">Cancel</button>';
    picker.style.display = 'flex';
    document.getElementById('scorerSelect').addEventListener('change', function(){
      if(!this.value) return;
      logGoal(this.value === '__unknown' ? null : this.value);
    });
    document.getElementById('scorerCancelBtn').addEventListener('click', hideScorerPicker);
  }

  function hideScorerPicker(){
    var picker = document.getElementById('scorerPicker');
    if(picker){ picker.style.display = 'none'; picker.innerHTML = ''; }
  }

  function logGoal(playerId){
    goalLog.push({
      id: makeId(),
      playerId: playerId,
      half: currentHalf,
      clockLabel: formatClock(clockSeconds)
    });
    hideScorerPicker();
    renderScoreboard();
    renderGoalLog();
  }

  function removeGoal(id){
    goalLog = goalLog.filter(function(g){ return g.id !== id; });
    renderScoreboard();
    renderGoalLog();
  }

  function removeLastGoal(){
    if(!goalLog.length) return;
    goalLog.pop();
    renderScoreboard();
    renderGoalLog();
  }

  function renderGoalLog(){
    var host = document.getElementById('goalLogCard');
    if(!host) return;
    if(!goalLog.length){
      host.style.display = 'none';
      return;
    }
    host.style.display = '';
    var rows = goalLog.map(function(g){
      var name = g.playerId ? nameOf(g.playerId) : 'Unknown';
      return '<div class="goal-row">'+

    host.querySelectorAll('.goal-remove').forEach(function(btn){

  function ensureAssignRow(id){
    if(!data.assignments[id]){
      data.assignments[id] = data.periodLabels.map(function(){return 'SUB';});
    }
  }

  function nameOf(id){
    var p = data.players.filter(function(x){return x.id===id;})[0];
    return p ? p.name : '';
  }

  function sortedPlayers(){
    return data.players.slice().sort(function(a,b){
      return a.name.localeCompare(b.name);
    });
  }

  function sortIdsByName(ids){
    return ids.slice().sort(function(a,b){
      return nameOf(a).localeCompare(nameOf(b));
    });
  }

  function getPitchForPeriod(p){
    // returns {code: playerId}
    var map = {};
    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      var code = data.assignments[pl.id][p];
      if(code && code !== 'SUB') map[code] = pl.id;
    });
    return map;
  }

  function getBenchForPeriod(p){
    return data.players.filter(function(pl){
      ensureAssignRow(pl.id);
      return data.assignments[pl.id][p] === 'SUB';
    }).map(function(pl){return pl.id;});
  }

  /* ---------- Pitch slot assignment ---------- */

  function displacePlayerFromCode(code, period, exceptId){
    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      if(pl.id !== exceptId && data.assignments[pl.id][period] === code){
        data.assignments[pl.id][period] = 'SUB';
      }
    });
  }

  /* ---------- Starting Lineup (Edit Team) ---------- */

  function assignStarter(playerId, code){
    ensureAssignRow(playerId);
    displacePlayerFromCode(code, 0, playerId);
    data.assignments[playerId][0] = code;
    saveData();
    renderEdit();
  }

  function clearStarterSlot(code){
    displacePlayerFromCode(code, 0, null);
    saveData();
    renderEdit();
  }

  function setPlayerAvailability(playerId, isUnavailable){
    var pl = data.players.filter(function(p){return p.id===playerId;})[0];
    if(!pl) return;
    pl.unavailable = isUnavailable;
    saveData();
    renderEdit();
  }

  function applyStartingLineupToAllPeriods(){
    var totalPeriods = data.periodLabels.length;
    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      var code0 = data.assignments[pl.id][0];
      for(var p = 1; p < totalPeriods; p++){
        data.assignments[pl.id][p] = code0;
      }
    });
    saveData();
    renderEdit();
    renderMatch();
  }

  function assignPlayerToSlot(playerId, code){
    var period = currentPeriod;
    ensureAssignRow(playerId);
    displacePlayerFromCode(code, period, playerId);
    data.assignments[playerId][period] = code;
    saveData();
    renderMatch();
  }

  function clearSlot(code){
    displacePlayerFromCode(code, currentPeriod, null);
    saveData();
    renderMatch();
  }

  function positionStatusLabel(id, period){
    ensureAssignRow(id);
    var v = data.assignments[id][period];
    return v === 'SUB' ? 'bench' : ('currently ' + v);
  }

  function isPeriodBlank(p){
    return data.players.every(function(pl){
      ensureAssignRow(pl.id);
      return data.assignments[pl.id][p] === 'SUB';
    });
  }

  function maybeCopyForwardPeriod(p){
    if(p <= 0) return;
    if(!isPeriodBlank(p)) return;
    if(isPeriodBlank(p - 1)) return;
    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      data.assignments[pl.id][p] = data.assignments[pl.id][p - 1];
    });
    saveData();
  }

  function formatMinutes(m){
    var rounded = Math.round(m * 10) / 10;
    return (rounded % 1 === 0 ? rounded.toFixed(0) : rounded.toFixed(1)) + ' min';
  }

  // True if any player has a real (non-SUB) assignment in any period from
  // index `fromIndex` onward — used to warn before a shrink would discard it.
  function periodsHaveAssignments(fromIndex){
    return data.players.some(function(pl){
      ensureAssignRow(pl.id);
      var arr = data.assignments[pl.id];
      for(var i = fromIndex; i < arr.length; i++){
        if(arr[i] !== 'SUB') return true;
      }
      return false;
    });
  }

  function regeneratePeriodStructure(perHalf){
    var totalPeriods = perHalf * 2;
    var duration = (HALF_LENGTH_SECONDS / 60) / perHalf;
    var newLabels = [];
    var newHalves = [];
    for(var i = 0; i < totalPeriods; i++){
      var start = Math.round(i * duration);
      var end = Math.round((i + 1) * duration);
      newLabels.push(start + '-' + end + ' min');
      newHalves.push(i < perHalf ? '1st Half' : '2nd Half');
    }
    data.periodLabels = newLabels;
    data.periodHalves = newHalves;
    data.periodsPerHalf = perHalf;

    data.players.forEach(function(pl){
      ensureAssignRow(pl.id);
      var arr = data.assignments[pl.id];
      if(arr.length > totalPeriods){
        data.assignments[pl.id] = arr.slice(0, totalPeriods);
      } else {
        while(arr.length < totalPeriods) arr.push('SUB');
      }
    });

    if(currentPeriod >= totalPeriods) currentPeriod = totalPeriods - 1;
    saveData();
  }

  function showSlotPicker(code, slotEl){
    document.querySelectorAll('.p-slot.active').forEach(function(el){ el.classList.remove('active'); });
    slotEl.classList.add('active');
    var picker = document.getElementById('slotPicker');
    if(!picker) return;
    var benchOptions = '', pitchOptions = '';
    sortedPlayers().filter(function(pl){ return !pl.unavailable; }).forEach(function(pl){
      var status = positionStatusLabel(pl.id, currentPeriod);
      var isBench = status === 'bench';
      var style = isBench ? ' style="background-color:var(--bench-tint);color:var(--bench);font-weight:700;"' : '';
      var opt = '<option value="'+pl.id+'"'+style+'>'+escapeHtml(pl.name)+' ('+status+')</option>';
      if(isBench) benchOptions += opt; else pitchOptions += opt;
    });
    picker.innerHTML =
      '<select id="slotSelect">'+
        '<option value="" disabled selected>Assign this slot…</option>'+
        '<optgroup label="On the bench">'+benchOptions+'</optgroup>'+
        '<optgroup label="On the pitch">'+pitchOptions+'</optgroup>'+
        '<option value="__bench__">Leave empty (bench)</option>'+
      '</select>'+
      '<button class="score-btn ghost" id="slotCancelBtn">Cancel</button>';
    picker.style.display = 'flex';
    document.getElementById('slotSelect').addEventListener('change', function(){
      if(!this.value) return;
      if(this.value === '__bench__'){ clearSlot(code); }
      else { assignPlayerToSlot(this.value, code); }
    });
    document.getElementById('slotCancelBtn').addEventListener('click', hideSlotPicker);
  }

  function hideSlotPicker(){
    var picker = document.getElementById('slotPicker');
    if(picker){ picker.style.display = 'none'; picker.innerHTML = ''; }
    document.querySelectorAll('.p-slot.active').forEach(function(el){ el.classList.remove('active'); });
  }

  /* ---------- Match Day view ---------- */

  function renderMatch(){
    hideSlotPicker();
    maybeCopyForwardPeriod(currentPeriod);

    var host = document.getElementById('matchView');
    var p = currentPeriod;
    var isLast = p === data.periodLabels.length - 1;
    var pitch = getPitchForPeriod(p);
    var bench = sortIdsByName(getBenchForPeriod(p));

    var pitchRowsHtml = getFormationRows().map(function(row){
      var slots = row.map(function(code){
        var id = pitch[code];
        var name = id ? nameOf(id) : '—';
        var markClass = !id ? 'p-mark p-mark-empty' : (code === 'GK' ? 'p-mark p-mark-gk' : 'p-mark');
        var pillClass = !id ? 'p-name-pill p-name-pill-empty' : 'p-name-pill';
        return '<div class="p-slot" data-code="'+code+'"><div class="'+markClass+'">'+code+'</div><div class="'+pillClass+'">'+escapeHtml(name)+'</div></div>';
      }).join('');
      return '<div class="pitch-row">'+slots+'</div>';
    }).join('');
    var linesHtml =
      '<div class="pitch">'+
        '<div class="pitch-box"></div><div class="pitch-circle"></div><div class="pitch-halfway"></div>'+
        '<div class="pitch-rows">'+pitchRowsHtml+'</div>'+
      '</div>';

    var benchHtml = bench.length
      ? bench.map(function(id){
          return '<div class="bench-row"><div class="bench-chip">SUB</div><div class="p-name">'+escapeHtml(nameOf(id))+'</div></div>';
        }).join('')
      : '<div class="empty-note">No one on the bench this period.</div>';

    var nextHtml;
    var swapHtml = '';
    if(isLast){
      nextHtml = '<div class="fulltime">Full time — no further subs</div>';
    } else {
      var next = p+1;
      var pitchNow = pitch;
      var pitchNext = getPitchForPeriod(next);

      var comingOn = sortIdsByName(data.players.filter(function(pl){
        var wasOn = Object.keys(pitchNow).some(function(c){return pitchNow[c]===pl.id;});
        var willBeOn = Object.keys(pitchNext).some(function(c){return pitchNext[c]===pl.id;});
        return !wasOn && willBeOn;
      }).map(function(pl){return pl.id;}));
      var comingOff = sortIdsByName(data.players.filter(function(pl){
        var wasOn = Object.keys(pitchNow).some(function(c){return pitchNow[c]===pl.id;});
        var willBeOn = Object.keys(pitchNext).some(function(c){return pitchNext[c]===pl.id;});
        return wasOn && !willBeOn;
      }).map(function(pl){return pl.id;}));
      var swapping = sortIdsByName(data.players.filter(function(pl){
        var wasOn = data.assignments[pl.id][p];
        var willBe = data.assignments[pl.id][next];
        return wasOn!=='SUB' && willBe!=='SUB' && wasOn!==willBe;
      }).map(function(pl){return pl.id;}));

      function posOfNext(id){
        return Object.keys(pitchNext).filter(function(c){return pitchNext[c]===id;})[0];
      }
      function posOfNow(id){
        return Object.keys(pitchNow).filter(function(c){return pitchNow[c]===id;})[0];
      }

      var onHtml = comingOn.length
        ? comingOn.map(function(id){
            return '<div class="pill on"><span class="pos">'+posOfNext(id)+'</span>'+escapeHtml(nameOf(id))+'</div>';
          }).join('')
        : '<span class="empty-note">No changes</span>';

      var offHtml = comingOff.length
        ? comingOff.map(function(id){
            return '<div class="pill off"><span class="pos">'+posOfNow(id)+'</span>'+escapeHtml(nameOf(id))+'</div>';
          }).join('')
        : '<span class="empty-note">No changes</span>';

      if(swapping.length){
        swapHtml = '<div class="swap-note">Also moving position: '+swapping.map(function(id){
          return '<b>'+escapeHtml(nameOf(id))+'</b> ('+data.assignments[id][p]+'→'+data.assignments[id][next]+')';
        }).join(', ')+'</div>';
      }

      nextHtml =
        '<div class="next-title">Next — Period '+(next+1)+'</div>'+
        '<div class="next-range">'+escapeHtml(data.periodHalves[next]||'')+' · '+escapeHtml(data.periodLabels[next]||'')+'</div>'+
        '<div class="chip-group"><div class="chip-label on">▲ Coming on</div><div class="chip-list">'+onHtml+'</div></div>'+
        '<div class="chip-group"><div class="chip-label off">▼ Coming off</div><div class="chip-list">'+offHtml+'</div></div>';
    }

    host.innerHTML =
      '<div class="stepper">'+
        '<button class="step-btn" id="prevBtn" '+(p===0?'disabled':'')+'>‹</button>'+
        '<div class="step-mid">'+
          '<div class="step-period">Period '+(p+1)+' of '+data.periodLabels.length+'</div>'+
          '<div class="step-clock">'+escapeHtml(data.periodHalves[p]||'')+' · '+escapeHtml(data.periodLabels[p]||'')+'</div>'+
        '</div>'+
        '<button class="step-btn" id="nextBtn" '+(isLast?'disabled':'')+'>›</button>'+
      '</div>'+
      '<div class="content">'+
        '<div class="card">'+
          '<div class="pitch-card-header"><h2>On Pitch</h2><span class="formation-badge">'+escapeHtml(data.formation)+'</span></div>'+
          linesHtml+
        '</div>'+
        '<div class="card">'+
          '<div class="bench-next-grid">'+
            '<div class="bench-col"><h2>Bench</h2>'+benchHtml+'</div>'+
            '<div class="next-col">'+nextHtml+'</div>'+
          '</div>'+
          swapHtml+
        '</div>'+
      '</div>';

    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    if(prevBtn) prevBtn.onclick = function(){ if(currentPeriod>0){currentPeriod--; renderMatch();} };
    if(nextBtn) nextBtn.onclick = function(){ if(currentPeriod<data.periodLabels.length-1){currentPeriod++; renderMatch();} };

    document.querySelectorAll('.p-slot').forEach(function(slotEl){
      slotEl.addEventListener('click', function(){
        if(this.classList.contains('active')){ hideSlotPicker(); return; }
        showSlotPicker(this.dataset.code, this);
      });
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  /* ---------- Edit view ---------- */

  function renderEdit(){
    var host = document.getElementById('editView');

    var rosterHtml = sortedPlayers().map(function(pl){
      var cats = pl.categories || [];
      var catBtns = ['DEF','MID','ATK'].map(function(code){

    var lineupRowsHtml = getStartingLineupPositions().map(function(code){
      var selectedId = pitch0[code] || '';
      var isEmpty = !selectedId;
      var benchOptions = '', pitchOptions = '';
      availablePlayers.forEach(function(pl){
        var status = positionStatusLabel(pl.id, 0);
        var isBench = status === 'bench';
        var style = isBench ? ' style="background-color:var(--bench-tint);color:var(--bench);font-weight:700;"' : '';
        var opt = '<option value="'+pl.id+'"'+(pl.id===selectedId?' selected':'')+style+'>'+escapeHtml(pl.name)+' ('+status+')</option>';
        if(isBench) benchOptions += opt; else pitchOptions += opt;
      });
      return '<div class="lineup-row'+(isEmpty?' empty':'')+'">'+
        '<span class="lineup-pos">'+code+'</span>'+
        '<select class="starterSelect" data-code="'+code+'">'+
          '<option value="" disabled'+(isEmpty?' selected':'')+'>Assign this slot…</option>'+
          '<optgroup label="On the bench">'+benchOptions+'</optgroup>'+
          '<optgroup label="On the pitch">'+pitchOptions+'</optgroup>'+
          '<option value="__bench__">Leave empty (bench)</option>'+
        '</select>'+
        '</div>';
    }).join('');

    var filledCount = Object.keys(pitch0).length;
    var reserveCount = reserveIds0.filter(function(id){
      var pl = data.players.filter(function(p){return p.id===id;})[0];
      return !(pl && pl.unavailable);
    }).length;
    var unavailableCount = reserveIds0.length - reserveCount;
    var squadSize = data.players.length;
    var countsOk = (filledCount + reserveCount + unavailableCount) === squadSize;
    var lineupStatusHtml = '<div class="lineup-status'+(countsOk?'':' warn')+'">'+
      (countsOk
        ? (filledCount+' of '+getStartingLineupPositions().length+' positions filled · '+reserveCount+' in reserve · '+unavailableCount+' unavailable')
        : ('⚠ '+filledCount+' starting + '+reserveCount+' reserve + '+unavailableCount+' unavailable = '+(filledCount+reserveCount+unavailableCount)+', but squad has '+squadSize+'. Check for stale position codes (e.g. left over from a previous formation).'))+
      '</div>';

    var reserveHtml = reserveIds0.length
      ? reserveIds0.map(function(id){
          var pl = data.players.filter(function(p){return p.id===id;})[0];
          var isUnavail = pl && pl.unavailable;
          return '<div class="reserve-row'+(isUnavail?' unavailable':'')+'">'+
            '<span class="reserve-name">'+escapeHtml(nameOf(id))+'</span>'+
            '<div class="reserve-toggle">'+
              '<button type="button" class="reserve-btn'+(!isUnavail?' active':'')+'" data-id="'+id+'" data-status="reserve">Reserve</button>'+
              '<button type="button" class="reserve-btn unavailable-btn'+(isUnavail?' active':'')+'" data-id="'+id+'" data-status="unavailable">Unavailable</button>'+
            '</div>'+
          '</div>';
        }).join('')
      : '<div class="empty-note">No reserves — squad size matches the starting XI.</div>';

    var periodRowsHtml = data.periodLabels.map(function(lbl, i){
      return '<div class="period-edit-row">'+
        '<span class="period-edit-idx">P'+(i+1)+'</span>'+
        '<input class="period-label-input periodHalfInput" data-idx="'+i+'" value="'+escapeHtml(data.periodHalves[i]||'')+'">'+
        '<input class="period-label-input periodLabelInput" data-idx="'+i+'" value="'+escapeHtml(lbl)+'">'+
        '</div>';
    }).join('');

    host.innerHTML =
      '<div class="edit-section">'+
        '<details id="squadDetails"'+(squadExpanded?' open':'')+'>'+
          '<summary><span class="summary-label">Squad</span></summary>'+
          '<div class="field-label">Player Name</div>'+
          '<div id="rosterList">'+rosterHtml+'</div>'+
          '<button class="add-btn" id="addPlayerBtn">+ Add player</button>'+
        '</details>'+
      '</div>'+
      '<div class="edit-section">'+
        '<h2>Formation</h2>'+
        '<select id="formationSelect">'+
          FORMATION_KEYS.map(function(key){
            return '<option value="'+key+'"'+(key===data.formation?' selected':'')+'>'+key+'</option>';
          }).join('')+
        '</select>'+
      '</div>'+
      '<div class="edit-section">'+
        '<details id="startingLineupDetails"'+(startingLineupExpanded?' open':'')+'>'+
          '<summary><span class="summary-label">Starting Lineup</span></summary>'+
          lineupStatusHtml+
          lineupRowsHtml+
          '<button class="add-btn" id="applyStartingLineupBtn">Apply to all periods</button>'+
          '<div class="field-label" style="margin-top:14px;">Reserve / Unavailable</div>'+
          '<div id="reserveList">'+reserveHtml+'</div>'+
        '</details>'+
      '</div>'+
      '<div class="edit-section">'+
        '<details id="periodsDetails"'+(periodsExpanded?' open':'')+'>'+
          '<summary><span class="summary-label">Periods</span><span class="summary-badge">'+
            data.periodsPerHalf+'/half · '+formatMinutes((HALF_LENGTH_SECONDS/60)/data.periodsPerHalf)+
          '</span></summary>'+
          '<div class="periods-slider-row">'+
            '<input type="range" id="periodsPerHalfSlider" min="1" max="5" step="1" value="'+data.periodsPerHalf+'">'+
            '<div class="periods-slider-readout" id="periodsSliderReadout"></div>'+
          '</div>'+
          '<div id="periodEditList">'+periodRowsHtml+'</div>'+
        '</details>'+
      '</div>'+
      '<div class="edit-section backup-box">'+
        '<details id="backupDetails"'+(backupExpanded?' open':'')+'>'+
          '<summary><span class="summary-label">Backup / restore</span></summary>'+
          '<textarea id="backupText" readonly></textarea>'+
          '<div class="backup-actions">'+
            '<button class="btn ghost" id="copyBackupBtn">Copy</button>'+
            '<button class="btn primary" id="restoreBackupBtn">Restore from text</button>'+
          '</div>'+
        '</details>'+
      '</div>';

    document.getElementById('backupText').value = JSON.stringify(data, null, 2);

    document.getElementById('squadDetails').addEventListener('toggle', function(){
      squadExpanded = this.open;
    });
    document.getElementById('backupDetails').addEventListener('toggle', function(){
      backupExpanded = this.open;
    });
    document.getElementById('periodsDetails').addEventListener('toggle', function(){
      periodsExpanded = this.open;
    });
    document.getElementById('startingLineupDetails').addEventListener('toggle', function(){
      startingLineupExpanded = this.open;
    });

    document.querySelectorAll('.playerNameInput').forEach(function(inp){
      inp.addEventListener('change', function(){
        var pl = data.players.filter(function(p){return p.id===inp.dataset.id;})[0];
        if(!pl) return;
        var newName = this.value.trim() || pl.name;
        if(newName !== pl.name){
          pl.name = newName;
          saveData();
          renderEdit();
        } else {
          renderEdit(); // reflect the sanitized (first-name-only) value in the field
        }
      });
    });

    document.querySelectorAll('.removePlayerBtn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = data.players.findIndex(function(p){return p.id===btn.dataset.id;});
        if(idx === -1) return;
        var pl = data.players[idx];
        if(confirm('Remove '+pl.name+' from the squad?')){
          data.players.splice(idx,1);
          delete data.assignments[pl.id];
          saveData();
          renderEdit();
        }
      });
    });

    document.querySelectorAll('.category-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var pl = data.players.filter(function(p){return p.id===btn.dataset.id;})[0];
        if(!pl) return;
        if(!pl.categories) pl.categories = [];
        var cat = btn.dataset.cat;
        var idx = pl.categories.indexOf(cat);
        if(idx === -1) pl.categories.push(cat); else pl.categories.splice(idx,1);
        saveData();
        renderEdit();
      });
    });

    document.getElementById('addPlayerBtn').addEventListener('click', function(){
      var input = prompt('Player name?');
      var name = (input||'').trim();
      if(name){
        var id = makeId();
        data.players.push({id:id, name:name, categories:[]});
        data.assignments[id] = data.periodLabels.map(function(){return 'SUB';});
        saveData();
        renderEdit();
      }
    });

    document.querySelectorAll('.periodHalfInput').forEach(function(inp){
      inp.addEventListener('change', function(){
        data.periodHalves[+this.dataset.idx] = this.value;
        saveData();
      });
    });
    document.querySelectorAll('.periodLabelInput').forEach(function(inp){
      inp.addEventListener('change', function(){
        data.periodLabels[+this.dataset.idx] = this.value;
        saveData();
      });
    });

    var perHalfSlider = document.getElementById('periodsPerHalfSlider');
    var perHalfReadout = document.getElementById('periodsSliderReadout');
    function updatePerHalfReadout(v){
      var duration = (HALF_LENGTH_SECONDS / 60) / v;
      perHalfReadout.textContent = v + ' period' + (v === 1 ? '' : 's') + ' per half · ' +
        formatMinutes(duration) + ' each · ' + (v * 2) + ' total periods';
    }
    updatePerHalfReadout(+perHalfSlider.value);
    perHalfSlider.addEventListener('input', function(){
      updatePerHalfReadout(+this.value);
    });
    perHalfSlider.addEventListener('change', function(){
      var newPerHalf = +this.value;
      if(newPerHalf === data.periodsPerHalf) return;
      var totalPeriods = newPerHalf * 2;
      var wouldLoseData = data.periodLabels.length > totalPeriods && periodsHaveAssignments(totalPeriods);
      if(wouldLoseData && !confirm('Reducing periods will discard lineup data set for periods beyond '+totalPeriods+'. Continue?')){
        this.value = data.periodsPerHalf;
        updatePerHalfReadout(data.periodsPerHalf);
        return;
      }
      regeneratePeriodStructure(newPerHalf);
      renderEdit();
      renderMatch();
    });

    document.getElementById('formationSelect').addEventListener('change', function(){
      var newKey = this.value;
      if(newKey === data.formation) return;
      if(formationChangeWouldBenchSomeone(newKey) && !confirm('Switching to '+newKey+' will bench any player whose current position doesn\'t exist in that formation. Continue?')){
        this.value = data.formation;
        return;
      }
      switchFormation(newKey);
      renderEdit();
      renderMatch();
    });

    document.querySelectorAll('.starterSelect').forEach(function(sel){
      sel.addEventListener('change', function(){
        var code = this.dataset.code;
        if(this.value && this.value !== '__bench__') assignStarter(this.value, code);
        else clearStarterSlot(code);
      });
    });

    document.querySelectorAll('.reserve-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        setPlayerAvailability(this.dataset.id, this.dataset.status === 'unavailable');
      });
    });

    document.getElementById('applyStartingLineupBtn').addEventListener('click', function(){
      if(confirm('Apply this starting lineup to every period? This replaces any existing per-period substitution plan.')){
        applyStartingLineupToAllPeriods();
      }
    });

    document.getElementById('copyBackupBtn').addEventListener('click', function(){
      var ta = document.getElementById('backupText');
      ta.select();
      try{ document.execCommand('copy'); }catch(e){}
      if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).catch(function(){}); }
      saveData();
    });

    document.getElementById('restoreBackupBtn').addEventListener('click', function(){
      var ta = document.getElementById('backupText');
      try{
        var parsed = JSON.parse(ta.value);
        if(parsed.players && parsed.assignments){
          if(!parsed.periodsPerHalf){
            parsed.periodsPerHalf = Math.round((parsed.periodLabels||[]).length / 2) || 3;
          }
          if(!parsed.formation || !FORMATIONS[parsed.formation]) parsed.formation = DEFAULT_FORMATION;
          ensurePlayerFields(parsed.players);
          data = parsed;
          currentPeriod = 0;
          saveData();
          renderEdit();
          renderMatch();
        } else {
          alert('That JSON is missing players/assignments.');
        }
      }catch(e){
        alert('Could not parse that JSON.');
      }
    });
  }

  /* ---------- Tabs ---------- */

  function showMatch(){
    document.getElementById('matchView').style.display = '';
    document.getElementById('editView').style.display = 'none';
    document.getElementById('timerBar').style.display = '';
    document.getElementById('scorePanel').style.display = '';
    document.getElementById('tabMatch').classList.add('active');
    document.getElementById('tabEdit').classList.remove('active');
    renderMatch();
    renderGoalLog();
  }
  function showEdit(){
    hideSlotPicker();
    document.getElementById('matchView').style.display = 'none';
    document.getElementById('editView').style.display = '';
    document.getElementById('timerBar').style.display = 'none';
    document.getElementById('scorePanel').style.display = 'none';
    document.getElementById('goalLogCard').style.display = 'none';
    document.getElementById('tabEdit').classList.add('active');
    document.getElementById('tabMatch').classList.remove('active');
    renderEdit();
  }
  document.getElementById('tabMatch').addEventListener('click', showMatch);
  document.getElementById('tabEdit').addEventListener('click', showEdit);
  document.getElementById('timerToggleBtn').addEventListener('click', toggleClock);
  document.getElementById('timerResetBtn').addEventListener('click', resetClock);
  document.getElementById('kissoGoalBtn').addEventListener('click', showScorerPicker);
  document.getElementById('kissoUndoBtn').addEventListener('click', removeLastGoal);
  document.getElementById('oppPlusBtn').addEventListener('click', function(){
    oppScore++; renderScoreboard();
  });
  document.getElementById('oppMinusBtn').addEventListener('click', function(){
    oppScore = Math.max(0, oppScore - 1); renderScoreboard();
  });
  document.getElementById('half1Btn').addEventListener('click', function(){ setHalf('1st Half'); });
  document.getElementById('half2Btn').addEventListener('click', function(){ setHalf('2nd Half'); });

  renderClock();
  renderScoreboard();
  renderMatch();
})();
</script>
</body>
</html>
